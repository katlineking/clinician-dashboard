<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoughLog - Clinician Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 min-h-screen flex flex-col">

    <nav class="bg-slate-900 text-white px-6 py-4 shadow-md flex justify-between items-center">
        <h1 class="font-bold text-xl flex items-center gap-2">
            <i data-lucide="activity"></i> Clinician Analysis Dashboard
        </h1>
        <div class="text-sm text-slate-400">BME Senior Design Project</div>
    </nav>

    <main class="flex-grow p-6 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <div class="lg:col-span-1 space-y-6">
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="font-bold text-slate-800 mb-4 border-b pb-2 flex items-center gap-2"><i data-lucide="upload-cloud" size="18"></i> Data Import</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2">1. Patient Activity (.csv)</label>
                        <input type="file" id="patientFile" accept=".csv" class="w-full text-xs text-slate-500 file:mr-2 file:py-1 file:px-3 file:rounded-lg file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2">2. ESP32 Belt (.csv)</label>
                        <input type="file" id="beltFile" accept=".csv" class="w-full text-xs text-slate-500 file:mr-2 file:py-1 file:px-3 file:rounded-lg file:border-0 file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100 cursor-pointer">
                    </div>
                    <button onclick="processData()" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl hover:bg-slate-800 transition shadow-md flex justify-center items-center gap-2 mt-4">
                        Generate Analysis
                    </button>
                </div>
            </div>

            <div id="colorLegendCard" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hidden">
                <h2 class="font-bold text-slate-800 mb-4 border-b pb-2 flex items-center gap-2"><i data-lucide="palette" size="18"></i> Activity Colors</h2>
                <div id="legendContainer" class="space-y-3">
                    </div>
            </div>

            <div class="bg-blue-50 p-6 rounded-2xl border border-blue-100">
                <h2 class="font-bold text-blue-800 mb-2 text-sm flex items-center gap-2"><i data-lucide="flask-conical" size="16"></i> Testing Tools</h2>
                <button onclick="generateFakeBeltData()" class="w-full bg-white text-blue-700 border border-blue-200 font-bold py-2 rounded-lg text-xs hover:bg-blue-100 transition shadow-sm">
                    Download Sample Belt CSV
                </button>
            </div>
        </div>

        <div class="lg:col-span-3 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col">
            
            <div class="flex border-b border-slate-200 mb-6 gap-6">
                <button onclick="switchTab('full')" id="tab-full" class="pb-3 text-sm font-bold border-b-2 border-blue-600 text-blue-600 transition">Full Study Timeline</button>
                <button onclick="switchTab('daily')" id="tab-daily" class="pb-3 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-600 transition">Daily View</button>
                <button onclick="switchTab('average')" id="tab-average" class="pb-3 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-600 transition">Average Patterns</button>
            </div>

            <div class="flex justify-between items-center mb-4 min-h-[40px]">
                <h2 id="chartTitle" class="font-bold text-lg text-slate-800">Cough Frequency vs. Triggers</h2>
                
                <div id="dailyControls" class="hidden flex gap-2 items-center">
                    <label class="text-sm font-bold text-slate-500">Select Day:</label>
                    <select id="daySelector" onchange="renderCurrentView()" class="bg-slate-50 border border-slate-200 rounded-lg px-3 py-1 text-sm outline-none focus:ring-2 focus:ring-blue-500"></select>
                </div>

                <button id="resetZoomBtn" onclick="resetZoom()" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 py-1.5 px-3 rounded-lg transition font-medium">Reset Zoom</button>
            </div>
            
            <div class="flex-grow relative min-h-[500px] w-full bg-slate-50 rounded-xl border border-slate-100 p-4">
                <canvas id="clinicianChart"></canvas>
            </div>
            <p id="chartHelper" class="text-center text-[10px] uppercase tracking-wider text-slate-400 mt-4 font-bold">Scroll to zoom. Click and drag to pan.</p>
        </div>

    </main>

    <script>
        lucide.createIcons();
        let chartInstance = null;
        let currentTab = 'full';
        
        // Global Data Storage
        let globalActivities = [];
        let globalCoughs = [];
        let uniqueDays = [];
        
        // Default Color Palette mapped to dynamically found activities
        let activityColors = {};
        const fallbackColors = ['#3b82f6', '#10b981', '#ef4444', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4'];

        function switchTab(tab) {
            currentTab = tab;
            
            // Update UI styling
            ['full', 'daily', 'average'].forEach(t => {
                document.getElementById(`tab-${t}`).className = t === tab 
                    ? "pb-3 text-sm font-bold border-b-2 border-blue-600 text-blue-600 transition" 
                    : "pb-3 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-600 transition";
            });

            // Toggle Specific Controls
            document.getElementById('dailyControls').classList.toggle('hidden', tab !== 'daily');
            document.getElementById('resetZoomBtn').classList.toggle('hidden', tab === 'average');
            
            // Update Text
            if(tab === 'full') document.getElementById('chartTitle').innerText = "Full Study Timeline";
            if(tab === 'daily') document.getElementById('chartTitle').innerText = "Isolated Daily Timeline";
            if(tab === 'average') document.getElementById('chartTitle').innerText = "Average Coughs per Hour of Day";
            
            document.getElementById('chartHelper').innerText = tab === 'average' 
                ? "Aggregated data across the entire study period." 
                : "Scroll to zoom. Click and drag to pan.";

            renderCurrentView();
        }

        async function processData() {
            const patientInput = document.getElementById('patientFile').files[0];
            const beltInput = document.getElementById('beltFile').files[0];
            if (!patientInput || !beltInput) return alert("Please upload both CSV files.");

            const patientText = await patientInput.text();
            const beltText = await beltInput.text();

            // 1. Parse Activities (UPDATED FOR SAFETY)
            globalActivities = [];
            const typesSet = new Set();
            const daysSet = new Set();

            patientText.trim().split('\n').slice(1).forEach(line => {
                if (!line.trim()) return; // Skip empty lines
                const cols = line.split(',');
                if (cols.length >= 3) {
                    const type = cols[0].trim();
                    // .trim() is CRUCIAL here to strip out hidden \r characters!
                    const startStr = cols[1].trim(); 
                    const endStr = cols[2].trim();   

                    typesSet.add(type);
                    daysSet.add(startStr.split('T')[0]); 
                    
                    // Convert directly to raw milliseconds (.getTime) to prevent Chart errors
                    globalActivities.push({ 
                        type: type, 
                        start: new Date(startStr).getTime(), 
                        end: new Date(endStr).getTime() 
                    });
                }
            });

            // 2. Parse Coughs (UPDATED FOR 4-COLUMN & MAC/SAFARI)
            globalCoughs = [];
            beltText.trim().split('\n').slice(1).forEach(line => {
                if (!line.trim()) return;
                const cols = line.split(',');
                
                if (cols.length >= 4) {
                    const classification = cols[3].trim();
                    if (classification === 'Cough') {
                        // Forcefully swap the space for a 'T' so Safari/Mac can read it
                        const safeDateStr = cols[0].trim().replace(' ', 'T');
                        
                        daysSet.add(safeDateStr.split('T')[0]); 
                        globalCoughs.push({ 
                            x: new Date(safeDateStr).getTime(), 
                            y: parseFloat(cols[2]) 
                        }); 
                    }
                } 
            });

            // 2. Parse Coughs (UPDATED FOR 4-COLUMN FORMAT)
            globalCoughs = [];
            beltText.trim().split('\n').slice(1).forEach(line => {
                const cols = line.split(',');
                
                // Check if it's the new 4-column clinical format
                if (cols.length >= 4) {
                    const classification = cols[3].trim();
                    
                    // Filter out movement artifacts, only plot real coughs
                    if (classification === 'Cough') {
                        const dateObj = new Date(cols[0]);
                        // Hardware timestamp uses a space instead of 'T'
                        daysSet.add(cols[0].split(' ')[0]); 
                        // Peak force is in column index 2
                        globalCoughs.push({ x: dateObj, y: parseFloat(cols[2]) }); 
                    }
                } 
                // Fallback just in case someone uses the old 2-column sample data
                else if (cols.length === 2) {
                    const dateObj = new Date(cols[0]);
                    daysSet.add(cols[0].split('T')[0]);
                    globalCoughs.push({ x: dateObj, y: parseFloat(cols[1]) });
                }
            });

            // 3. Setup Days Dropdown
            uniqueDays = Array.from(daysSet).sort();
            const daySelector = document.getElementById('daySelector');
            daySelector.innerHTML = uniqueDays.map(d => `<option value="${d}">${new Date(d).toLocaleDateString()}</option>`).join('');

            // 4. Setup Dynamic Colors
            activityColors = {};
            Array.from(typesSet).forEach((type, index) => {
                activityColors[type] = fallbackColors[index % fallbackColors.length];
            });
            buildColorLegend();

            // 5. Draw
            document.getElementById('colorLegendCard').classList.remove('hidden');
            renderCurrentView();
        }

        function buildColorLegend() {
            const container = document.getElementById('legendContainer');
            container.innerHTML = Object.keys(activityColors).map(type => `
                <div class="flex items-center justify-between">
                    <span class="text-sm font-medium text-slate-700">${type}</span>
                    <input type="color" value="${activityColors[type]}" onchange="updateColor('${type}', this.value)" class="w-8 h-8 rounded border-none cursor-pointer p-0 bg-transparent">
                </div>
            `).join('');
        }

        function updateColor(type, hex) {
            activityColors[type] = hex;
            renderCurrentView(); // Instantly redraws the graph with new color
        }

        function renderCurrentView() {
            if (globalActivities.length === 0 && globalCoughs.length === 0) return; // Prevent drawing if no data

            if (currentTab === 'full') drawTimelineChart(null);
            else if (currentTab === 'daily') drawTimelineChart(document.getElementById('daySelector').value);
            else if (currentTab === 'average') drawAverageChart();
        }

        function drawTimelineChart(specificDate) {
            const ctx = document.getElementById('clinicianChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            const annotations = {};
            globalActivities.forEach((act, index) => {
                annotations[`box${index}`] = {
                    type: 'box', xMin: act.start, xMax: act.end,
                    backgroundColor: activityColors[act.type] + '40', // 25% opacity
                    borderWidth: 0,
                    label: { display: true, content: act.type, position: 'start', color: activityColors[act.type], font: { size: 10, weight: 'bold' } }
                };
            });

            let options = {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    x: {
                        type: 'time',
                        time: { unit: 'hour', displayFormats: { hour: 'MMM d, h a' } },
                        title: { display: true, text: 'Timeline' }
                    },
                    y: { min: 0, title: { display: true, text: 'Cough Intensity' } }
                },
                plugins: {
                    annotation: { annotations: annotations },
                    legend: { display: false },
                    zoom: {
                        pan: { enabled: true, mode: 'x' },
                        zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x' }
                    }
                }
            };

            // If a specific date is selected, lock the X-axis to that 24 hour period
            if (specificDate) {
                options.scales.x.min = new Date(specificDate + 'T00:00:00');
                options.scales.x.max = new Date(specificDate + 'T23:59:59');
            }

            chartInstance = new Chart(ctx, {
                type: 'scatter',
                data: {
                    datasets: [{
                        label: 'Cough Event', data: globalCoughs,
                        backgroundColor: '#0f172a', pointRadius: 4, pointHoverRadius: 6
                    }]
                },
                options: options
            });
        }

        function drawAverageChart() {
            const ctx = document.getElementById('clinicianChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            // Calculate total coughs per hour (0-23)
            let hourlyCounts = new Array(24).fill(0);
            globalCoughs.forEach(cough => {
                const hour = cough.x.getHours();
                hourlyCounts[hour]++;
            });

            // Divide by number of unique days to get the average
            const numDays = uniqueDays.length || 1;
            const hourlyAverages = hourlyCounts.map(count => (count / numDays).toFixed(2));

            const labels = Array.from({length: 24}, (_, i) => {
                if (i === 0) return '12 AM';
                if (i === 12) return '12 PM';
                return i > 12 ? `${i-12} PM` : `${i} AM`;
            });

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Avg Coughs per Hour',
                        data: hourlyAverages,
                        backgroundColor: '#3b82f6',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { title: { display: true, text: 'Hour of the Day' } },
                        y: { title: { display: true, text: 'Average Number of Coughs' }, beginAtZero: true }
                    },
                    plugins: {
                        legend: { display: false },
                        zoom: { pan: { enabled: false }, zoom: { enabled: false } } // Disable zoom for simple bar chart
                    }
                }
            });
        }

        function resetZoom() { if (chartInstance && currentTab !== 'average') chartInstance.resetZoom(); }

        // Generator matches the new ISO standard format expected by the parser
        function generateFakeBeltData() {
            let csv = "Timestamp,Intensity\n";
            let baseTime = new Date();
            baseTime.setHours(8, 0, 0, 0); 
            for(let i=0; i<30; i++) {
                let time = new Date(baseTime.getTime() + Math.random() * 24 * 60 * 60 * 1000); // Spread over 24 hrs
                let intensity = (Math.random() * 8 + 2).toFixed(1); 
                csv += `${time.toISOString().split('.')[0]},${intensity}\n`; // Removes milliseconds for cleaner CSV
            }
            const link = document.createElement("a");
            link.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
            link.download = `Sample_ESP32_Belt_Data.csv`;
            link.click();
        }
    </script>
</body>
</html>

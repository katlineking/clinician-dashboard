<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoughLog - Clinician Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 min-h-screen flex flex-col">

    <nav class="bg-slate-900 text-white px-6 py-4 shadow-md flex justify-between items-center">
        <h1 class="font-bold text-xl flex items-center gap-2">
            <i data-lucide="activity"></i> Clinician Analysis Dashboard
        </h1>
        <div class="text-sm text-slate-400">BME Senior Design Project</div>
    </nav>

    <main class="flex-grow p-6 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="font-bold text-slate-800 mb-4 border-b pb-2 flex items-center gap-2"><i data-lucide="upload-cloud" size="18"></i> Data Import</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2">1. Select Patient</label>
                        <select id="patientSelector" class="w-full text-xs text-slate-700 bg-blue-50 border-0 rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer font-bold">
                            <option value="" disabled selected>Loading patients...</option>
                        </select>
                    </div>
                    
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-200">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2">2. ESP32 Belt Data</label>
                        <div class="flex gap-2 mb-3">
                            <button id="connectBtn" onclick="connectESP32()" class="flex-1 bg-emerald-100 text-emerald-700 font-bold py-2 rounded-lg text-xs hover:bg-emerald-200 transition border border-emerald-200 flex justify-center items-center gap-1">
                                <i data-lucide="plug" size="14"></i> Connect
                            </button>
                            <button id="pullDataBtn" onclick="pullDataFromESP32()" class="hidden flex-1 bg-slate-800 text-white font-bold py-2 rounded-lg text-xs hover:bg-slate-700 transition flex justify-center items-center gap-1">
                                <i data-lucide="download" size="14"></i> Pull Data
                            </button>
                        </div>
                        <div class="text-[9px] text-center text-slate-400 mb-2 font-bold uppercase tracking-widest">- OR UPLOAD FILE -</div>
                        <input type="file" id="beltFile" onchange="usbBeltData=''" accept=".csv" class="w-full text-xs text-slate-500 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:bg-slate-200 file:text-slate-700 cursor-pointer">

                        <div id="rawDataContainer" class="hidden mt-3 pt-3 border-t border-slate-200">
                            <label class="block text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1">Raw USB Output Preview:</label>
                            <textarea id="rawDataView" readonly class="w-full h-32 bg-slate-900 text-emerald-400 font-mono text-[10px] p-2 rounded-lg outline-none resize-y shadow-inner"></textarea>
                        </div>
                    </div>

                    <button onclick="processData()" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl hover:bg-slate-800 transition shadow-md flex justify-center items-center gap-2 mt-2">
                        Generate Analysis
                    </button>
                </div>
            </div>

            <div id="colorLegendCard" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hidden">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 class="font-bold text-slate-800 flex items-center gap-2"><i data-lucide="palette" size="18"></i> Activity Colors</h2>
                    <button onclick="resetColors()" class="text-xs font-bold text-slate-500 hover:text-blue-600 flex items-center gap-1 transition"><i data-lucide="rotate-ccw" size="14"></i> Reset</button>
                </div>
                <div id="legendContainer" class="space-y-3"></div>
            </div>
        </div>

        <div class="lg:col-span-3 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col">
            <div class="flex border-b border-slate-200 mb-6 gap-6">
                <button onclick="switchTab('daily')" id="tab-daily" class="pb-3 text-sm font-bold border-b-2 border-blue-600 text-blue-600 transition">Daily View</button>
                <button onclick="switchTab('full')" id="tab-full" class="pb-3 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-600 transition">Full Study Timeline</button>
                <button onclick="switchTab('average')" id="tab-average" class="pb-3 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-600 transition">Average Patterns</button>
            </div>

            <div class="flex justify-between items-center mb-4 min-h-[40px]">
                <h2 id="chartTitle" class="font-bold text-lg text-slate-800">Isolated Daily Timeline</h2>
                <div id="dailyControls" class="flex gap-2 items-center">
                    <label class="text-sm font-bold text-slate-500">Select Day:</label>
                    <select id="daySelector" onchange="renderCurrentView()" class="bg-slate-50 border border-slate-200 rounded-lg px-3 py-1 text-sm outline-none focus:ring-2 focus:ring-blue-500"></select>
                </div>
                <button id="resetZoomBtn" onclick="resetZoom()" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 py-1.5 px-3 rounded-lg transition font-medium">Reset Zoom</button>
            </div>
            
            <div class="flex-grow relative min-h-[350px] w-full bg-slate-50 rounded-xl border border-slate-100 p-4">
                <canvas id="clinicianChart"></canvas>
            </div>
            <p id="chartHelper" class="text-center text-[10px] uppercase tracking-wider text-slate-400 mt-4 font-bold">Scroll to zoom. Click and drag to pan.</p>
        </div>
    </main>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx1UEs7qzOsxMkA2v2vC2ECgyANnUWTst4nYkQXNw-AgVetulsROWyccvt6f-FbSpLKnA/exec';

        window.onload = function() {
            lucide.createIcons();
            fetchPatientList();
        };

        let chartInstance = null;
        let currentTab = 'daily'; 
        let globalActivities = [];
        let globalCoughs = [];
        let uniqueDays = [];
        let globalTypesSet = []; 
        let activityColors = {};
        const fallbackColors = ['#3b82f6', '#10b981', '#ef4444', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4'];
        let customPresets = []; 
        let openPickerType = null;
        let serialPort;
        let usbBeltData = ""; 

        async function fetchPatientList() {
            const selector = document.getElementById('patientSelector');
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getPatients`);
                const names = await response.json();
                if (names.length === 0) {
                    selector.innerHTML = `<option value="" disabled>No patients found</option>`;
                    return;
                }
                selector.innerHTML = `<option value="" disabled selected>Select a Patient...</option>` + 
                    names.map(name => `<option value="${name}">${name}</option>`).join('');
            } catch (error) {
                console.error("Database Error:", error);
                selector.innerHTML = `<option value="" disabled>Error loading database</option>`;
            }
        }

        async function connectESP32() {
            try {
                serialPort = await navigator.serial.requestPort();
                await serialPort.open({ baudRate: 115200 }); 
                document.getElementById('connectBtn').innerHTML = `<i data-lucide="check-circle" size="14"></i> Connected`;
                document.getElementById('connectBtn').classList.replace('bg-emerald-100', 'bg-emerald-500');
                document.getElementById('connectBtn').classList.replace('text-emerald-700', 'text-white');
                document.getElementById('pullDataBtn').classList.remove('hidden');
                lucide.createIcons();
            } catch (err) { alert("Connection failed. Use Chrome/Edge."); }
        }

        async function pullDataFromESP32() {
            if (!serialPort) return alert("Connect belt first.");
            const btn = document.getElementById('pullDataBtn');
            btn.innerHTML = `<i data-lucide="loader" class="animate-spin" size="14"></i> Reading...`;
            usbBeltData = ""; 
            try {
                const encoder = new TextEncoder();
                const writer = serialPort.writable.getWriter();
                await writer.write(encoder.encode("SEND_DATA\n"));
                writer.releaseLock();
                const decoder = new TextDecoder();
                const reader = serialPort.readable.getReader();
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    usbBeltData += decoder.decode(value, { stream: true });
                    if (usbBeltData.includes("END_OF_FILE")) {
                        usbBeltData = usbBeltData.replace("END_OF_FILE", ""); 
                        const headerIndex = usbBeltData.indexOf("Timestamp,");
                        if (headerIndex !== -1) usbBeltData = usbBeltData.substring(headerIndex);
                        break;
                    }
                }
                reader.releaseLock();
                document.getElementById('rawDataContainer').classList.remove('hidden');
                document.getElementById('rawDataView').value = usbBeltData || "No data on SD card.";
                btn.innerHTML = `<i data-lucide="check" size="14"></i> Data Ready!`;
                btn.classList.replace('bg-slate-800', 'bg-green-600');
                lucide.createIcons();
            } catch (error) { btn.innerHTML = `<i data-lucide="download" size="14"></i> Pull Data`; }
        }

        async function processData() {
            const patientId = document.getElementById('patientSelector').value;
            const beltInput = document.getElementById('beltFile').files[0];
            if (!patientId) return alert("Select a patient from the dropdown.");
            
            let beltText = usbBeltData !== "" ? usbBeltData : (beltInput ? await beltInput.text() : null);
            if (!beltText) return alert("Please Pull Data from the belt or upload a hardware CSV file.");

            const btn = document.querySelector('button[onclick="processData()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="loader" class="animate-spin" size="14"></i> Syncing Cloud...`;
            lucide.createIcons();

            try {
                // Fetch JSON Logs from your Apps Script (Bypasses CORS)
                const response = await fetch(`${SCRIPT_URL}?action=getLogs&patientId=${encodeURIComponent(patientId)}`);
                const logs = await response.json();

                const daysSet = new Set();
                const typesSet = new Set();

                globalActivities = logs.map(log => {
                    // Browser-safe Date conversion
                    const cleanStart = log.start.toString().replace(' ', 'T');
                    const cleanEnd = log.end.toString().replace(' ', 'T');
                    const startTs = new Date(cleanStart).getTime();
                    const endTs = new Date(cleanEnd).getTime();
                    
                    typesSet.add(log.type);
                    daysSet.add(new Date(startTs).toISOString().split('T')[0]);
                    return { type: log.type, start: startTs, end: endTs };
                });

                globalTypesSet = Array.from(typesSet);
                globalCoughs = [];
                beltText.trim().split('\n').slice(1).forEach(line => {
                    const cols = line.split(',');
                    if (cols.length >= 4 && cols[3].trim() === 'Cough') {
                        const safeDateStr = cols[0].trim().replace(' ', 'T');
                        daysSet.add(safeDateStr.split('T')[0]); 
                        globalCoughs.push({ x: new Date(safeDateStr).getTime(), y: parseFloat(cols[2]) }); 
                    }
                });

                uniqueDays = Array.from(daysSet).sort();
                document.getElementById('daySelector').innerHTML = uniqueDays.map(d => `<option value="${d}">${new Date(d + 'T12:00:00').toLocaleDateString()}</option>`).join('');
                resetColors(false); 
                document.getElementById('colorLegendCard').classList.remove('hidden');
                switchTab('daily');
            } catch (e) {
                console.error("Processing Error:", e);
                alert("Failed to sync with Google Sheets. Make sure the Apps Script is deployed to 'Anyone'.");
            } finally {
                btn.innerHTML = originalText;
                lucide.createIcons();
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            ['full', 'daily', 'average'].forEach(t => {
                document.getElementById(`tab-${t}`).className = t === tab ? "pb-3 text-sm font-bold border-b-2 border-blue-600 text-blue-600 transition" : "pb-3 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-600 transition";
            });
            document.getElementById('dailyControls').classList.toggle('hidden', tab !== 'daily');
            document.getElementById('resetZoomBtn').classList.toggle('hidden', tab === 'average');
            renderCurrentView();
        }

        function resetColors(shouldRender = true) {
            activityColors = {};
            globalTypesSet.forEach((t, i) => activityColors[t] = fallbackColors[i % fallbackColors.length]);
            buildColorLegend();
            if (shouldRender) renderCurrentView();
        }

        function buildColorLegend() {
            const container = document.getElementById('legendContainer');
            const allPresets = [...fallbackColors, ...customPresets];
            container.innerHTML = Object.keys(activityColors).map(type => `
                <div class="flex flex-col border-b border-slate-100 last:border-0 pb-2">
                    <div class="flex items-center justify-between">
                        <span class="text-sm font-medium text-slate-700">${type}</span>
                        <button onclick="togglePicker('${type}')" class="w-8 h-8 rounded shadow-sm border border-slate-300" style="background-color: ${activityColors[type]}40; border-color: ${activityColors[type]}"></button>
                    </div>
                    <div id="picker-${type}" class="${openPickerType === type ? 'block' : 'hidden'} mt-3 p-3 bg-white border border-slate-200 shadow-md rounded-xl">
                        <div class="flex flex-wrap gap-2 mb-3">
                            ${allPresets.map(color => `<button onclick="applyColor('${type}', '${color}')" class="w-6 h-6 rounded-full" style="background-color: ${color}"></button>`).join('')}
                        </div>
                        <div class="flex items-center justify-between border-t pt-3">
                            <input type="color" id="custom-${type}" class="w-6 h-6">
                            <button onclick="addPresetAndApply('${type}')" class="text-[10px] bg-slate-900 text-white px-2 py-1 rounded">Apply</button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function togglePicker(t) { openPickerType = openPickerType === t ? null : t; buildColorLegend(); }
        function applyColor(t, c) { activityColors[t] = c; openPickerType = null; buildColorLegend(); renderCurrentView(); }
        function addPresetAndApply(t) { const c = document.getElementById(`custom-${t}`).value; if (!customPresets.includes(c)) customPresets.push(c); applyColor(t, c); }

        function renderCurrentView() {
            if (globalActivities.length || globalCoughs.length) {
                if (currentTab === 'full') drawTimelineChart(null);
                else if (currentTab === 'daily') drawTimelineChart(document.getElementById('daySelector').value);
                else drawAverageChart();
            }
        }

        function drawTimelineChart(date) {
            const ctx = document.getElementById('clinicianChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            const maxF = globalCoughs.length ? Math.max(...globalCoughs.map(c => c.y)) : 10;
            const annotations = {};
            globalActivities.forEach((act, i) => {
                annotations[`box${i}`] = { type: 'box', xMin: act.start, xMax: act.end, backgroundColor: activityColors[act.type] + '40', borderWidth: 0 };
            });
            chartInstance = new Chart(ctx, {
                type: 'scatter',
                data: { datasets: [{ label: 'Cough', data: globalCoughs, backgroundColor: '#0f172a' }] },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { type: 'time', time: { unit: 'hour' }, min: date ? new Date(date + 'T00:00:00').getTime() : null, max: date ? new Date(date + 'T23:59:59').getTime() : null },
                        y: { min: 0, max: maxF * 1.2 }
                    },
                    plugins: { annotation: { annotations }, zoom: { pan: { enabled: true, mode: 'x' }, zoom: { wheel: { enabled: true }, mode: 'x' } } }
                }
            });
        }

        function drawAverageChart() {
            const ctx = document.getElementById('clinicianChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            let counts = new Array(24).fill(0);
            globalCoughs.forEach(c => counts[new Date(c.x).getHours()]++);
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: { labels: Array.from({length: 24}, (_, i) => i + ':00'), datasets: [{ data: counts.map(c => (c / (uniqueDays.length || 1)).toFixed(2)), backgroundColor: '#3b82f6' }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function resetZoom() { if (chartInstance) chartInstance.resetZoom(); }
    </script>
</body>
</html>
